<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Scatter Mahjong - Old Skull Luxurious</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rubik+Mono+One&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: radial-gradient(circle at center, #0c0a0a, #1a0f0f 95%);
    --gold: #ffd700;
    --blood-red: #ff1a1a;
    --neon-purple: #9d00ff;
    --smoke-gray: rgba(50,50,50,0.6);
    --panel-glass: rgba(15,15,15,0.85);
    --glow-shadow: rgba(255,215,0,0.25);
    --green-success: #39ff14;
  }

  * { box-sizing: border-box; font-family: 'Orbitron', monospace; font-weight: 600; }
  body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg-dark);
    display: flex; align-items: center; justify-content: center;
  }

  /* Canvas particle & smoke effect */
  #vortexCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .main-wrapper {
    position: relative; z-index: 10;
    width: 95%; max-width: 1200px;
    display: flex; flex-direction: column; align-items: center;
  }

  /* Header */
  .moving-h1 {
    font-family: 'Rubik Mono One', monospace;
    color: var(--gold);
    font-size: 3rem;
    letter-spacing: 10px;
    margin-bottom: 25px;
    text-transform: uppercase;
    text-align: center;
    text-shadow: 
      0 0 10px var(--gold),
      0 0 20px var(--blood-red),
      0 0 40px var(--neon-purple),
      0 0 60px var(--gold);
    animation: floatMove 3s ease-in-out infinite;
  }

  @keyframes floatMove {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-7px); }
  }

  /* Outer glowing border */
  .container-outer {
    position: relative;
    padding: 5px;
    border-radius: 25px;
    overflow: hidden;
    width: 100%;
    background: linear-gradient(120deg, var(--blood-red), var(--neon-purple), var(--gold));
    background-size: 400% 400%;
    animation: borderFlow 8s ease infinite;
    box-shadow: 0 0 25px var(--blood-red), 0 0 50px var(--neon-purple);
  }

  @keyframes borderFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Inner glassy panel */
  .container {
    width: 100%;
    padding: 35px;
    background: var(--panel-glass);
    backdrop-filter: blur(25px);
    border-radius: 20px;
    border-left: 5px solid var(--blood-red);
    border-bottom: 12px solid var(--neon-purple);
    position: relative; z-index: 1;
    box-shadow: inset 0 0 30px var(--smoke-gray), 0 0 40px var(--glow-shadow);
    transition: 0.3s;
  }

  textarea {
    width: 100%; height: 180px;
    background: rgba(0,0,0,0.75);
    border: 2px solid var(--blood-red);
    color: #fff; padding: 18px;
    font-family: 'Consolas', monospace;
    font-size: 15px; border-radius: 15px;
    resize: none; outline: none;
    box-shadow: inset 0 0 15px rgba(255,255,255,0.05);
    transition: 0.3s;
  }

  textarea:focus {
    border: 2px solid var(--neon-purple);
    box-shadow: 0 0 35px var(--neon-purple), 0 0 55px var(--blood-red);
  }

  /* UP Box */
  #upInfo { width: 100%; margin: 25px 0; display: flex; justify-content: center; }
  #upSpan {
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 70px;
    background: rgba(0,0,0,0.85);
    border: 2px solid var(--neon-purple);
    font-size: 30px; color: var(--neon-purple);
    letter-spacing: 6px; border-radius: 15px;
    text-shadow: 0 0 15px var(--neon-purple), 0 0 25px var(--gold);
    box-shadow: inset 0 0 25px var(--glow-shadow), 0 0 35px var(--glow-shadow);
    transition: 0.2s; user-select: none;
  }

  /* Konslet big win effect */
  .konslet-text {
    color: var(--green-success) !important;
    text-shadow: 0 0 15px var(--green-success), 0 0 35px var(--green-success);
    animation: blink-konslet 0.15s infinite alternate !important;
  }
  .up-flash-konslet {
    border-color: var(--green-success) !important;
    animation: blink-konslet 0.12s infinite alternate !important;
  }
  @keyframes blink-konslet {
    0%,100% { opacity:1; filter: contrast(1.4); }
    50% { opacity:0.2; filter: contrast(0.7); }
  }

  /* Button copy */
  .btn-copy {
    margin-top: 25px;
    padding: 18px 70px;
    background: linear-gradient(135deg, var(--blood-red), var(--neon-purple));
    color: #fff; border: none; font-size: 17px; border-radius: 50px;
    cursor: pointer; outline: none;
    box-shadow: 0 0 20px var(--blood-red), 0 0 40px var(--neon-purple);
    transition: 0.3s ease;
  }
  .btn-copy:hover {
    transform: scale(1.1);
    box-shadow: 0 0 35px var(--blood-red), 0 0 60px var(--neon-purple);
  }
  .btn-copy:active { transform: scale(0.95); }

  /* Table */
  .table-responsive {
    width: 100%; margin-top: 25px; max-height: 300px; overflow-y: auto;
    border-radius: 15px; background: rgba(0,0,0,0.6);
    box-shadow: inset 0 0 15px var(--glow-shadow);
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: rgba(0,0,0,0.95); color: var(--gold);
    padding: 12px; font-size: 12px; border-bottom: 2px solid var(--neon-purple);
    text-shadow: 0 0 10px var(--gold); position: sticky; top: 0;
  }
  tbody td {
    padding: 12px; text-align: center; font-size: 14px;
    border-bottom: 1px solid rgba(255,215,0,0.15);
    color: var(--neon-purple); transition: transform 0.2s, background 0.2s;
  }
  tbody tr:hover { background: rgba(255,0,0,0.15); transform: scale(1.02); }
</style>
</head>
<body>

<canvas id="vortexCanvas"></canvas>

<div class="main-wrapper">
  <h1 class="moving-h1">SCATTER MAHJONG</h1>
  <div class="container-outer">
    <div class="container">
      <textarea id="inputData" placeholder="Tempel data di sini..."></textarea>
      <div id="upInfo"><span id="upSpan">UP KEMENANGAN : -</span></div>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>USER ID</th><th>NAMA</th><th>REKENING</th><th>GAME</th><th>TICKET</th><th>MENANG</th><th>BET</th>
            </tr>
          </thead>
          <tbody id="tbodyBonus">
            <tr><td colspan="7" style="color:#666; padding:40px;">[ AWAITING_INPUT ]</td></tr>
          </tbody>
        </table>
      </div>
      <div style="text-align:center;">
        <button class="btn-copy" onclick="copyTableData()">SALIN DATA</button>
      </div>
    </div>
  </div>
</div>

<script>
  // === Canvas vortex particles ===
  const vCanvas = document.getElementById('vortexCanvas');
  const vCtx = vCanvas.getContext('2d');
  let vParticles=[];
  const colors=['#ff1a1a','#9d00ff','#ffd700'];
  function resize(){vCanvas.width=innerWidth;vCanvas.height=innerHeight;}
  window.addEventListener('resize', resize); resize();
  class Part{constructor(){this.reset()} reset(){this.x=vCanvas.width/2;this.y=vCanvas.height/2;this.oldX=this.x;this.oldY=this.y;this.size=Math.random()*2+1;this.angle=Math.random()*Math.PI*2;this.speed=Math.random()*0.3+0.1;this.color=colors[Math.floor(Math.random()*colors.length)];} update(){this.oldX=this.x;this.oldY=this.y;this.x+=Math.cos(this.angle)*this.speed;this.y+=Math.sin(this.angle)*this.speed;this.speed*=1.035;if(this.x<0||this.x>vCanvas.width||this.y<0||this.y>vCanvas.height)this.reset();} draw(){vCtx.strokeStyle=this.color;vCtx.lineWidth=this.size;vCtx.beginPath();vCtx.moveTo(this.oldX,this.oldY);vCtx.lineTo(this.x,this.y);vCtx.stroke();}}
  for(let i=0;i<120;i++) vParticles.push(new Part());
  function animate(){vCtx.fillStyle='rgba(12,10,10,0.3)';vCtx.fillRect(0,0,vCanvas.width,vCanvas.height);vParticles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animate);}
  animate();

  // === Parsing & Table logic ===
  const ta=document.getElementById("inputData");
  const upBox=document.getElementById("upSpan");

  ta.addEventListener("input",function(){
    const text=(this.value||"").trim();
    if(!text){upBox.textContent="UP KEMENANGAN : -";upBox.classList.remove("up-flash-konslet");document.getElementById("tbodyBonus").innerHTML='<tr><td colspan="7" style="color:#666; padding:40px;">[ AWAITING_INPUT ]</td></tr>';return;}
    const blocks=text.split(/\n\s*\n/);
    const rows=blocks.map(parseBlock).filter(Boolean);
    renderTable(rows);
  });

  function parseBlock(block){
    let lines=block.split('\n');
    let data={userId:"-",permainan:"-",ticket:"-",menang:0,taruhan:0};
    let ticketMatches=block.match(/\d{18,20}/g);
    if(ticketMatches){let freq={};ticketMatches.forEach(t=>freq[t]=(freq[t]||0)+1);data.ticket=Object.keys(freq).reduce((a,b)=>freq[a]>freq[b]?a:b);}
    lines.forEach((line,i)=>{
      let clean=line.trim(), l=clean.toLowerCase();
      if(l.includes("mahjong")||l.includes("ways")||l.includes("wild bandito")||l.includes("lucky neko")||l.includes("pg soft")||l.includes("pragmatic")) data.permainan=clean;
      if(l.includes("credit")){let val=extractMoney(clean);if(val===0&&lines[i+1]) val=extractMoney(lines[i+1]);data.menang+=val;}
      if(l.includes("debit")){let val=extractMoney(clean);if(val===0&&lines[i+1]) val=extractMoney(lines[i+1]);data.taruhan=val;}
      if(clean.length>=3&&clean.length<=15&&/^[a-zA-Z0-9_]+$/.test(clean)&&!/(idr|credit|debit|ext|pg|balance|mahjong|ways|wild|neko)/i.test(l)) data.userId=clean;
    });
    if(data.permainan==="-"&&lines[0]) data.permainan=lines[0].trim();
    return (data.menang>0||data.userId!="-")?data:null;
  }
  function extractMoney(str){return parseInt(str.replace(/[.,]/g,"").replace(/[^\d]/g,""))||0;}
  function renderTable(rows){
    const tbody=document.getElementById("tbodyBonus"); tbody.innerHTML="";
    upBox.classList.remove("up-flash-konslet");
    rows.forEach(r=>{
      let up=r.taruhan>0?(r.menang/r.taruhan):0;
      upBox.textContent=`UP KEMENANGAN : ${Math.round(up)} x`;
      let tr=document.createElement("tr");
      let isBigWin=up>=300;if(isBigWin) upBox.classList.add("up-flash-konslet");
      const flashClass=isBigWin?'class="konslet-text"':'';
      tr.innerHTML=`
        <td ${flashClass}>${r.userId}</td>
        <td ${flashClass}>-</td>
        <td ${flashClass}>-</td>
        <td ${flashClass}>${r.permainan}</td>
        <td style="font-size:11px;">${r.ticket}</td>
        <td ${flashClass} style="color:#fff;">${r.menang.toLocaleString('id-ID')}</td>
        <td ${flashClass} style="color:var(--gold);">${r.taruhan.toLocaleString('id-ID')}</td>
      `;
      tbody.appendChild(tr);
    });
  }
  function copyTableData(){
    const btn=document.querySelector(".btn-copy"); let out="";
    document.querySelectorAll("#tbodyBonus tr").forEach(tr=>{
      let tds=tr.querySelectorAll("td");
      if(tds.length===7&&tds[0].innerText!=="[ AWAITING_INPUT ]") out+=Array.from(tds).map(td=>td.innerText).join("\t")+"\n";
    });
    if(out){navigator.clipboard.writeText(out).then(()=>{btn.innerText="BERHASIL DISALIN!";setTimeout(()=>{btn.innerText="SALIN DATA";},1200);});}
  }
</script>
</body>
</html>
