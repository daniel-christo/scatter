<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Scatter Mahjong - Retro Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Courier+Prime&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --fg: #fff;
    --accent: #fff;
    --glitch-red: #f00;
    --glitch-blue: #0ff;
  }

  * { box-sizing: border-box; }
  body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'VT323', monospace;
    display: flex; justify-content: center; align-items: center;
  }

  #vortexCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .main-wrapper {
    position: relative; z-index: 10;
    width: 95%; max-width: 1000px;
  }

  /* Glitch Title */
  .moving-h1 {
    font-size: 3rem;
    text-align: center;
    letter-spacing: 5px;
    color: var(--fg);
    position: relative;
    font-family: 'Press Start 2P', cursive;
    animation: glitchText 2s infinite;
  }
  .moving-h1::before, .moving-h1::after {
    content: 'SCATTER MAHJONG';
    position: absolute;
    left: 0; top: 0;
    width: 100%;
    overflow: hidden;
  }
  .moving-h1::before { left: 2px; text-shadow: -2px 0 var(--glitch-red); clip: rect(0,900px,30px,0); animation: glitchTop 2s infinite; }
  .moving-h1::after { left: -2px; text-shadow: -2px 0 var(--glitch-blue); clip: rect(35px,900px,70px,0); animation: glitchBottom 2.5s infinite; }

  @keyframes glitchText {
    0%,100% { transform: none; }
    20% { transform: skew(-1deg, -1deg); }
    40% { transform: skew(1deg, 1deg); }
    60% { transform: translate(-1px,-1px); }
    80% { transform: translate(1px,1px); }
  }
  @keyframes glitchTop { 0%,100% { clip: rect(0,900px,30px,0); } 50% { clip: rect(10px,900px,40px,0); } }
  @keyframes glitchBottom { 0%,100% { clip: rect(35px,900px,70px,0); } 50% { clip: rect(45px,900px,70px,0); } }

  .container-outer {
    margin-top: 20px;
    border: 1px solid var(--fg);
    padding: 5px;
    border-radius: 5px;
  }

  .container {
    background: #111;
    padding: 25px;
    border-radius: 5px;
    border: 1px solid var(--fg);
  }

  textarea {
    width: 100%;
    height: 150px;
    background: #000;
    border: 1px solid var(--fg);
    color: var(--fg);
    padding: 10px;
    font-family: 'Courier Prime', monospace;
    font-size: 14px;
    resize: none;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }

  #upInfo { width: 100%; margin: 15px 0; text-align: center; }
  #upSpan {
    display: inline-block;
    padding: 10px 15px;
    border: 1px solid var(--fg);
    font-family: 'VT323', monospace;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--fg);
  }

  .konslet-text { color: var(--accent); }

  /* Copy Button Glitch */
  .btn-copy {
    margin-top: 15px;
    padding: 10px 50px;
    font-family: 'Press Start 2P', cursive;
    font-size: 14px;
    background: #000;
    color: var(--fg);
    border: 1px solid var(--fg);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .btn-copy::before, .btn-copy::after {
    content: 'SALIN DATA';
    position: absolute; left: 0; top: 0;
    width: 100%; height: 100%;
  }
  .btn-copy::before { left: 1px; text-shadow: -1px 0 var(--glitch-red); clip: rect(0,200px,20px,0); animation: glitchBtnTop 2s infinite; }
  .btn-copy::after { left: -1px; text-shadow: -1px 0 var(--glitch-blue); clip: rect(5px,200px,40px,0); animation: glitchBtnBottom 2.5s infinite; }

  @keyframes glitchBtnTop { 0%,100% { clip: rect(0,200px,20px,0); } 50% { clip: rect(10px,200px,25px,0); } }
  @keyframes glitchBtnBottom { 0%,100% { clip: rect(5px,200px,40px,0); } 50% { clip: rect(15px,200px,40px,0); } }

  .table-responsive {
    width: 100%;
    margin-top: 15px;
    max-height: 220px;
    overflow-y: auto;
    border: 1px solid var(--fg);
  }
  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: center; font-size: 12px; padding: 5px; border-bottom: 1px solid var(--fg); }
  tbody td { text-align: center; font-size: 12px; padding: 5px; border-bottom: 1px solid #222; }
  tbody tr:hover { background: #222; }

  canvas { position: fixed; inset:0; z-index:0; pointer-events:none; }
</style>
</head>
<body>

<canvas id="vortexCanvas"></canvas>

<div class="main-wrapper">
  <h1 class="moving-h1">SCATTER MAHJONG</h1>
  <div class="container-outer">
    <div class="container">
      <textarea id="inputData" placeholder="Tempel data di sini..."></textarea>
      <div id="upInfo"><span id="upSpan">UP KEMENANGAN : -</span></div>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>USER ID</th><th>NAMA</th><th>REKENING</th><th>GAME</th><th>TICKET</th><th>MENANG</th><th>BET</th>
            </tr>
          </thead>
          <tbody id="tbodyBonus">
            <tr><td colspan="7">[ AWAITING_INPUT ]</td></tr>
          </tbody>
        </table>
      </div>
      <div style="text-align:center;">
        <button class="btn-copy" onclick="copyTableData()">SALIN DATA</button>
      </div>
    </div>
  </div>
</div>

<script>
const ta = document.getElementById("inputData");
const upBox = document.getElementById("upSpan");

ta.addEventListener("input",function(){
  const text=(this.value||"").trim();
  if(!text){
    upBox.textContent="UP KEMENANGAN : -";
    document.getElementById("tbodyBonus").innerHTML='<tr><td colspan="7">[ AWAITING_INPUT ]</td></tr>';
    return;
  }
  const blocks=text.split(/\n\s*\n/);
  const rows=blocks.map(parseBlock).filter(Boolean);
  renderTable(rows);
});

function parseBlock(block){
  let lines=block.split('\n');
  let data={userId:"-",permainan:"-",ticket:"-",menang:0,taruhan:0};
  let ticketMatches=block.match(/\d{18,20}/g);
  if(ticketMatches){let freq={};ticketMatches.forEach(t=>freq[t]=(freq[t]||0)+1);data.ticket=Object.keys(freq).reduce((a,b)=>freq[a]>freq[b]?a:b);}
  lines.forEach((line,i)=>{
    let clean=line.trim(); let l=clean.toLowerCase();
    if(l.includes("mahjong")||l.includes("ways")||l.includes("wild")||l.includes("lucky")||l.includes("pg soft")||l.includes("pragmatic")) data.permainan=clean;
    if(l.includes("credit")){let val=extractMoney(clean); if(val===0&&lines[i+1]) val=extractMoney(lines[i+1]); data.menang+=val;}
    if(l.includes("debit")){let val=extractMoney(clean); if(val===0&&lines[i+1]) val=extractMoney(lines[i+1]); data.taruhan=val;}
    if(clean.length>=3&&clean.length<=15&&/^[a-zA-Z0-9_]+$/.test(clean)&&!/(idr|credit|debit|ext|pg|balance|mahjong|ways|wild|neko)/i.test(l)) data.userId=clean;
  });
  if(data.permainan==="-"&&lines[0]) data.permainan=lines[0].trim();
  return (data.menang>0||data.userId!="-")?data:null;
}
function extractMoney(str){return parseInt(str.replace(/[.,]/g,"").replace(/[^\d]/g,""))||0;}

function renderTable(rows){
  const tbody=document.getElementById("tbodyBonus");
  tbody.innerHTML="";
  rows.forEach(r=>{
    let up=r.taruhan>0?(r.menang/r.taruhan):0;
    upBox.textContent=`UP KEMENANGAN : ${Math.round(up)} x`;
    let tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${r.userId}</td>
      <td>-</td>
      <td>-</td>
      <td>${r.permainan}</td>
      <td>${r.ticket}</td>
      <td>${r.menang.toLocaleString('en-US')}</td>
      <td>${r.taruhan.toLocaleString('en-US')}</td>
    `;
    tbody.appendChild(tr);
  });
}

function copyTableData(){
  let out="";
  document.querySelectorAll("#tbodyBonus tr").forEach(tr=>{
    let tds=tr.querySelectorAll("td");
    if(tds.length===7&&tds[0].innerText!=="[ AWAITING_INPUT ]")
      out+=Array.from(tds).map(td=>td.innerText).join("\t")+"\n";
  });
  if(out) navigator.clipboard.writeText(out).then(()=>{ alert("Data berhasil disalin!"); });
}

// === Canvas Vortex ===
const vCanvas = document.getElementById('vortexCanvas');
const vCtx = vCanvas.getContext('2d');
let vParticles = [];
const colors = ['#fff'];
function resize(){ vCanvas.width=innerWidth; vCanvas.height=innerHeight; }
window.addEventListener('resize', resize); resize();
class Part{constructor(){this.reset()} reset(){this.x=vCanvas.width/2;this.y=vCanvas.height/2;this.oldX=this.x;this.oldY=this.y;this.size=Math.random()*2+1;this.angle=Math.random()*Math.PI*2;this.speed=Math.random()*0.5+0.2;this.color=colors[0];} update(){this.oldX=this.x;this.oldY=this.y;this.x+=Math.cos(this.angle)*this.speed;this.y+=Math.sin(this.angle)*this.speed;this.speed*=1.02;if(this.x<0||this.x>vCanvas.width||this.y<0||this.y>vCanvas.height)this.reset();} draw(){vCtx.strokeStyle=this.color;vCtx.lineWidth=this.size;vCtx.beginPath();vCtx.moveTo(this.oldX,this.oldY);vCtx.lineTo(this.x,this.y);vCtx.stroke();}}
for(let i=0;i<120;i++) vParticles.push(new Part());
function animate(){vCtx.fillStyle='rgba(0,0,0,0.2)';vCtx.fillRect(0,0,vCanvas.width,vCanvas.height);vParticles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animate);}
animate();

</script>
</body>
</html>
